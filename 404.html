<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Not Found</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600&family=Manrope:wght@400;600&display=swap"
    rel="stylesheet"
  />

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #0d0d0d;
      color: #fff;
      font-family: "Manrope", sans-serif;
      animation: fadeIn 0.4s ease-out;
      text-align: center;
      padding: 20px;
    }

    .mascot {
      position: relative;
      font-family: "Chakra Petch", sans-serif;
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 10px;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px #ff0055, -2px -2px #00eaff; }
      50% { text-shadow: -2px 2px #ff0055, 2px -2px #00eaff; }
      100% { text-shadow: 2px -2px #ff0055, -2px 2px #00eaff; }
    }

    .icon {
      width: 70px;
      height: 70px;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    h1 {
      font-family: "Chakra Petch", sans-serif;
      font-size: 2rem;
      margin: 0 0 10px 0;
    }

    p {
      opacity: 0.7;
      margin: 0 0 20px 0;
      font-size: 1rem;
    }

    .button {
      display: inline-block;
      padding: 12px 26px;
      background: #ffffff15;
      border: 1px solid #ffffff30;
      border-radius: 8px;
      color: #fff;
      text-decoration: none;
      font-size: 1rem;
      transition: 0.25s ease;
      margin-bottom: 30px;
    }

    .button:hover {
      background: #ffffff25;
      border-color: #ffffff60;
      transform: translateY(-2px);
    }

    .redirect-list {
      margin-top: 10px;
      opacity: 0.8;
      font-size: 0.95rem;
    }

    .redirect-list a {
      color: #fff;
      text-decoration: none;
      border-bottom: 1px solid #ffffff30;
      padding-bottom: 2px;
      transition: 0.2s ease;
    }

    .redirect-list a:hover {
      border-color: #ffffff80;
      opacity: 1;
    }

    .suggestion {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0.9;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <img src="/assets/icons/warning.svg" alt="Warning" class="icon" />

  <div class="mascot">404</div>

  <h1>Redirect not found</h1>
  <p>The page you tried to access does not exist.</p>

  <a href="/" class="button">Go to homepage</a>

  <div id="suggestion" class="suggestion"></div>

  <div class="redirect-list">
    <p>Try one of these instead:</p>
    <p>
      <a href="/github">/github</a> •
      <a href="/discord">/discord</a> •
      <a href="/twitch">/twitch</a> •
      <a href="/x">/x</a> •
      <a href="/bsky">/bsky</a> •
      <a href="/youtube">/youtube</a> •
      <a href="/steam">/steam</a> •
      <a href="/playstation">/playstation</a> •
      <a href="/sponsor">/sponsor</a> •
      <a href="/patreon">/patreon</a>
    </p>
  </div>

  <script>
    const redirects = [
      "github", "discord", "twitch", "x", "bsky",
      "youtube", "steam", "playstation", "sponsor", "patreon"
    ];

    const attempted = window.location.pathname.replace("/", "").toLowerCase();

    function distance(a, b) {
      const dp = Array(a.length + 1).fill(null).map(() =>
        Array(b.length + 1).fill(null)
      );

      for (let i = 0; i <= a.length; i++) dp[i][0] = i;
      for (let j = 0; j <= b.length; j++) dp[0][j] = j;

      for (let i = 1; i <= a.length; i++) {
        for (let j = 1; j <= b.length; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost
          );
        }
      }
      return dp[a.length][b.length];
    }

    let best = null;
    let bestDist = Infinity;

    redirects.forEach(r => {
      const d = distance(attempted, r);
      if (d < bestDist) {
        bestDist = d;
        best = r;
      }
    });

    if (best && bestDist <= 3 && attempted !== "") {
      document.getElementById("suggestion").innerHTML =
        `Did you mean <a href="/${best}">/${best}</a>?`;
    }
  </script>

</body>
</html>
